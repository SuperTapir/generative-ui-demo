[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "generative-ui"
version = "0.3.0"
description = "Platform-agnostic generative UI tool definitions for LLMs — use with any Python backend"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
keywords = ["generative-ui", "llm", "ai", "widget", "openai", "anthropic", "tool-calling"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://github.com/anthropics/generative-ui"
Repository = "https://github.com/anthropics/generative-ui"

[tool.hatch.build.targets.wheel]
packages = ["src/generative_ui"]
